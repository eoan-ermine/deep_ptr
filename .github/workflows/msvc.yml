name: msvc

on:
  push:
    branches:
      - master
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - '**/*.md'

jobs:
  build:
    runs-on: windows-2025-vs2026
    timeout-minutes: 25

    strategy:
      fail-fast: false
      matrix:
        build_type: [Release]

    env:
      BUILD_EXAMPLES: ON

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{matrix.build_type}} -Ddeepptr_BUILD_EXAMPLES=${{env.BUILD_EXAMPLES}}

    - name: Build
      run: cmake --build build --config ${{matrix.build_type}} --parallel
